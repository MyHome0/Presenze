<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Libro Presenze - Angelo Ianniello</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#1B2A4A" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #EDE6D6; }
  .stamp {
    font-family: 'Special Elite', monospace;
    transform: rotate(-6deg);
    border: 2px solid #B23A2E;
    color: #B23A2E;
    border-radius: 4px;
    padding: 0 4px;
    font-size: 8px;
    letter-spacing: 0.5px;
    display: inline-block;
    opacity: 0.85;
  }
  .daycell:active { transform: scale(0.96); }
  ::selection { background: #D9CBAE; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const GIORNI_SETT = ["L","M","M","G","V","S","D"];
const PAUSA_MINUTI = 60;
const ORDINARIO_MINUTI = 480;

function pad(n) { return String(n).padStart(2, "0"); }
function monthKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`; }
function dayKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function eur(n) { return (n || 0).toLocaleString("it-IT", { style: "currency", currency: "EUR" }); }
function fmtH(h) { const s = h % 1 === 0 ? h.toFixed(0) : h.toFixed(1); return `${s}h`; }

function computeBreakdown(oreStr, minStr) {
  const totalMinuti = (parseInt(oreStr, 10) || 0) * 60 + (parseInt(minStr, 10) || 0);
  if (totalMinuti <= 0) return { ordinarieH: 0, straordinarioH: 0 };
  const netMinuti = Math.max(totalMinuti - PAUSA_MINUTI, 0);
  const ordinarieMinuti = Math.min(netMinuti, ORDINARIO_MINUTI);
  const straordinarioRaw = Math.max(netMinuti - ORDINARIO_MINUTI, 0);
  const straordinarioArrotondato = Math.round(straordinarioRaw / 30) * 30;
  return { ordinarieH: ordinarieMinuti / 60, straordinarioH: straordinarioArrotondato / 60 };
}

// --- Storage locale sul telefono (sostituisce window.storage di Claude) ---
const store = {
  get(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  set(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (e) { return false; }
  },
};

const DEFAULT_SETTINGS = {
  pagaGiornaliera: "", tariffaStraordinario: "", percentualeTrasferta: "",
  bonusGiornaliero: "", trasfertaTuttoMese: false, bonusTuttoMese: false,
};
const EMPTY_ENTRY = { ore: "", minuti: "", trasferta: false, bonus: false };

function StipendioApp() {
  const [settings, setSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...(store.get("settings") || {}) }));
  const [view, setView] = useState("calendario");
  const [currentMonth, setCurrentMonth] = useState(() => { const t = new Date(); return new Date(t.getFullYear(), t.getMonth(), 1); });
  const [monthData, setMonthData] = useState({});
  const [selectedDay, setSelectedDay] = useState(null);
  const [draft, setDraft] = useState(EMPTY_ENTRY);
  const [toast, setToast] = useState("");

  const loadMonth = useCallback(() => {
    const data = store.get(`month:${monthKey(currentMonth)}`) || {};
    setMonthData(data);
  }, [currentMonth]);

  useEffect(() => { loadMonth(); }, [loadMonth]);

  function persistSettings(next) {
    setSettings(next);
    store.set("settings", next);
    flashToast("Parametri salvati");
  }
  function persistMonth(next) {
    setMonthData(next);
    store.set(`month:${monthKey(currentMonth)}`, next);
  }
  function flashToast(msg) { setToast(msg); setTimeout(() => setToast(""), 1800); }

  function openDay(d) {
    const k = dayKey(d);
    setSelectedDay(k);
    const existing = monthData[k];
    setDraft(existing ? { ...EMPTY_ENTRY, ...existing } : { ...EMPTY_ENTRY });
  }

  function saveDraft() {
    const hasData = (parseInt(draft.ore, 10) || 0) > 0 || (parseInt(draft.minuti, 10) || 0) > 0;
    const next = { ...monthData };
    if (hasData) next[selectedDay] = draft; else delete next[selectedDay];
    persistMonth(next);
    setSelectedDay(null);
    flashToast("Giornata salvata");
  }
  function deleteDay() {
    const next = { ...monthData };
    delete next[selectedDay];
    persistMonth(next);
    setSelectedDay(null);
    flashToast("Giornata eliminata");
  }

  function effectiveTrasferta(entry) { return settings.trasfertaTuttoMese ? true : !!(entry && entry.trasferta); }
  function effectiveBonus(entry) { return settings.bonusTuttoMese ? true : !!(entry && entry.bonus); }

  function dayValue(entry) {
    if (!entry) return { ordinarieH: 0, straordinarioH: 0, ordinarioVal: 0, straordinarioVal: 0, trasfertaVal: 0, bonusVal: 0, totale: 0 };
    const paga = parseFloat(settings.pagaGiornaliera) || 0;
    const tStr = parseFloat(settings.tariffaStraordinario) || 0;
    const pTra = parseFloat(settings.percentualeTrasferta) || 0;
    const bonusImporto = parseFloat(settings.bonusGiornaliero) || 0;
    const { ordinarieH, straordinarioH } = computeBreakdown(entry.ore, entry.minuti);
    const ordinarioVal = ordinarieH > 0 ? paga * (ordinarieH / 8) : 0;
    const straordinarioVal = straordinarioH * tStr;
    const trasfertaVal = effectiveTrasferta(entry) ? paga * (pTra / 100) : 0;
    const bonusVal = effectiveBonus(entry) ? bonusImporto : 0;
    return { ordinarieH, straordinarioH, ordinarioVal, straordinarioVal, trasfertaVal, bonusVal, totale: ordinarioVal + straordinarioVal + trasfertaVal + bonusVal };
  }

  function monthTotals() {
    let giorni = 0, oreOrd = 0, oreStr = 0, impOrd = 0, impStr = 0, impTra = 0, impBon = 0;
    Object.values(monthData).forEach((e) => {
      const v = dayValue(e);
      if (v.ordinarieH > 0 || v.straordinarioH > 0) giorni += 1;
      oreOrd += v.ordinarieH; oreStr += v.straordinarioH;
      impOrd += v.ordinarioVal; impStr += v.straordinarioVal;
      impTra += v.trasfertaVal; impBon += v.bonusVal;
    });
    return { giorni, oreOrd, oreStr, impOrd, impStr, impTra, impBon, totale: impOrd + impStr + impTra + impBon };
  }

  const totals = monthTotals();
  const settingsIncomplete = !settings.pagaGiornaliera || !settings.tariffaStraordinario || !settings.percentualeTrasferta;

  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startOffset = (firstOfMonth.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));
  const todayKey = dayKey(new Date());
  const draftValue = dayValue(draft);

  return (
    <div style={S.page}>
      <div style={S.header}>
        <div>
          <div style={S.eyebrow}>Angelo Ianniello</div>
          <h1 style={S.title}>Libro Presenze</h1>
        </div>
        <button onClick={() => setView(view === "calendario" ? "impostazioni" : "calendario")} style={S.iconBtn}>
          {view === "calendario" ? "⚙" : "📅"}
        </button>
      </div>

      {settingsIncomplete && (
        <div style={S.warnBanner}>Imposta paga giornaliera, tariffa straordinario e % trasferta in <b>Impostazioni</b> per iniziare a calcolare lo stipendio.</div>
      )}

      {view === "impostazioni" ? (
        <SettingsView settings={settings} onSave={persistSettings} />
      ) : (
        <>
          <div style={S.monthNav}>
            <button style={S.navBtn} onClick={() => setCurrentMonth(new Date(year, month - 1, 1))}>‹</button>
            <div style={S.monthLabel}>{MESI[month]} {year}</div>
            <button style={S.navBtn} onClick={() => setCurrentMonth(new Date(year, month + 1, 1))}>›</button>
          </div>

          <div style={S.weekRow}>{GIORNI_SETT.map((g, i) => (<div key={i} style={S.weekDay}>{g}</div>))}</div>

          <div style={S.grid}>
            {cells.map((d, i) => {
              if (!d) return <div key={i} />;
              const k = dayKey(d);
              const entry = monthData[k];
              const isToday = k === todayKey;
              const v = dayValue(entry);
              const worked = v.ordinarieH > 0 || v.straordinarioH > 0;
              return (
                <button key={i} className="daycell" onClick={() => openDay(d)}
                  style={{ ...S.dayCell, ...(isToday ? S.dayCellToday : {}), ...(worked ? S.dayCellWorked : {}) }}>
                  <span style={S.dayNum}>{d.getDate()}</span>
                  {worked && <span style={S.dayHours}>{fmtH(v.ordinarieH + v.straordinarioH)}</span>}
                  {entry && effectiveTrasferta(entry) && <span className="stamp" style={S.dayStamp}>TR</span>}
                </button>
              );
            })}
          </div>

          <div style={S.summary}>
            <div style={S.summaryHeaderRow}>
              <span style={S.summaryEyebrow}>Riepilogo del mese</span>
              <span style={S.summaryDays}>{totals.giorni} giorni lavorati</span>
            </div>
            <SummaryLine label="Ore ordinarie" value={fmtH(totals.oreOrd)} amount={totals.impOrd} />
            <SummaryLine label="Straordinari" value={fmtH(totals.oreStr)} amount={totals.impStr} />
            <SummaryLine label="Trasferte" amount={totals.impTra} />
            <SummaryLine label="Bonus" amount={totals.impBon} />
            <div style={S.totalRow}>
              <span style={S.totalLabel}>Totale stipendio</span>
              <span style={S.totalAmount}>{eur(totals.totale)}</span>
            </div>
          </div>
        </>
      )}

      {selectedDay && (
        <div style={S.modalOverlay} onClick={() => setSelectedDay(null)}>
          <div style={S.modalCard} onClick={(e) => e.stopPropagation()}>
            <div style={S.modalHeader}>
              <span style={S.modalTitle}>{selectedDay.split("-").reverse().join("/")}</span>
              <button style={S.iconBtn} onClick={() => setSelectedDay(null)}>✕</button>
            </div>

            <Field label="Ore totali lavorate (dall'entrata all'uscita)">
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 1 }}>
                  <input type="number" min="0" max="24" inputMode="numeric" value={draft.ore}
                    onChange={(e) => setDraft({ ...draft, ore: e.target.value })} style={S.input} placeholder="ore" />
                  <div style={S.inputSub}>ore</div>
                </div>
                <div style={{ flex: 1 }}>
                  <input type="number" min="0" max="59" inputMode="numeric" value={draft.minuti}
                    onChange={(e) => setDraft({ ...draft, minuti: e.target.value })} style={S.input} placeholder="min" />
                  <div style={S.inputSub}>minuti</div>
                </div>
              </div>
            </Field>

            <div style={S.breakdownBox}>
              <div style={S.breakdownRow}><span>Ordinarie</span><b>{fmtH(draftValue.ordinarieH)}</b></div>
              <div style={S.breakdownRow}><span>Straordinario (arrotondato)</span><b>{fmtH(draftValue.straordinarioH)}</b></div>
            </div>

            <ToggleRow label="Trasferta" sub={`${settings.percentualeTrasferta || 0}% sulla paga giornaliera`}
              checked={effectiveTrasferta(draft)} locked={settings.trasfertaTuttoMese}
              onClick={() => !settings.trasfertaTuttoMese && setDraft({ ...draft, trasferta: !draft.trasferta })} />
            <ToggleRow label="Bonus" sub={`${eur(parseFloat(settings.bonusGiornaliero) || 0)} se attivo`}
              checked={effectiveBonus(draft)} locked={settings.bonusTuttoMese}
              onClick={() => !settings.bonusTuttoMese && setDraft({ ...draft, bonus: !draft.bonus })} />

            <div style={S.dayPreview}>Totale giornata: <b>{eur(draftValue.totale)}</b></div>

            <div style={S.modalActions}>
              {monthData[selectedDay] && (<button onClick={deleteDay} style={S.deleteBtn}>🗑 Elimina</button>)}
              <button onClick={saveDraft} style={S.saveBtn}>Salva</button>
            </div>
          </div>
        </div>
      )}

      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

function SummaryLine({ label, value, amount }) {
  return (
    <div style={S.summaryRow}>
      <span style={S.summaryLabel}>{label}{value ? <span style={S.summarySub}> · {value}</span> : null}</span>
      <span style={S.summaryValue}>{eur(amount)}</span>
    </div>
  );
}
function Field({ label, children }) {
  return (<div style={{ marginBottom: 14 }}><label style={S.fieldLabel}>{label}</label>{children}</div>);
}
function ToggleRow({ label, sub, checked, locked, onClick }) {
  return (
    <button onClick={onClick} style={{ ...S.toggle, ...(checked ? S.toggleActive : {}), ...(locked ? S.toggleLocked : {}) }}>
      <span style={{ ...S.toggleBox, ...(checked ? {} : S.toggleBoxOff) }}>{checked && "✓"}</span>
      <span style={{ textAlign: "left" }}>
        <div>{label}{locked ? " (attivo per tutto il mese)" : ""}</div>
        <div style={S.toggleSub}>{sub}</div>
      </span>
    </button>
  );
}
function SettingsView({ settings, onSave }) {
  const [local, setLocal] = useState(settings);
  const [savedFlash, setSavedFlash] = useState(false);
  useEffect(() => setLocal(settings), [settings]);
  function handleSave() { onSave(local); setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1200); }
  return (
    <div style={S.settingsWrap}>
      <p style={S.settingsIntro}>Questi parametri sono sempre modificabili e valgono per tutti i calcoli, mese per mese. Restano salvati su questo telefono.</p>
      <Field label="Paga giornaliera (€, per una giornata ordinaria da 8 ore)">
        <input type="number" min="0" step="0.01" inputMode="decimal" value={local.pagaGiornaliera}
          onChange={(e) => setLocal({ ...local, pagaGiornaliera: e.target.value })} style={S.input} placeholder="es. 75.00" />
      </Field>
      <Field label="Tariffa straordinario (€/ora fissa)">
        <input type="number" min="0" step="0.01" inputMode="decimal" value={local.tariffaStraordinario}
          onChange={(e) => setLocal({ ...local, tariffaStraordinario: e.target.value })} style={S.input} placeholder="es. 12.00" />
      </Field>
      <Field label="Percentuale trasferta (% sulla paga giornaliera)">
        <input type="number" min="0" step="1" inputMode="decimal" value={local.percentualeTrasferta}
          onChange={(e) => setLocal({ ...local, percentualeTrasferta: e.target.value })} style={S.input} placeholder="es. 20" />
      </Field>
      <Field label="Importo bonus giornaliero (€)">
        <input type="number" min="0" step="0.01" inputMode="decimal" value={local.bonusGiornaliero}
          onChange={(e) => setLocal({ ...local, bonusGiornaliero: e.target.value })} style={S.input} placeholder="es. 5.00" />
      </Field>
      <ToggleRow label="Trasferta per tutto il mese" sub="Applica la trasferta automaticamente a tutti i giorni lavorati"
        checked={local.trasfertaTuttoMese} locked={false}
        onClick={() => setLocal({ ...local, trasfertaTuttoMese: !local.trasfertaTuttoMese })} />
      <ToggleRow label="Bonus per tutto il mese" sub="Applica il bonus automaticamente a tutti i giorni lavorati"
        checked={local.bonusTuttoMese} locked={false}
        onClick={() => setLocal({ ...local, bonusTuttoMese: !local.bonusTuttoMese })} />
      <div style={{ height: 6 }} />
      <button onClick={handleSave} style={S.saveBtn}>{savedFlash ? "Salvato ✓" : "Salva parametri"}</button>
    </div>
  );
}

const S = {
  page: { minHeight: "100vh", background: "#EDE6D6", fontFamily: "'IBM Plex Sans', sans-serif", color: "#1B2A4A", padding: "20px 16px 40px", maxWidth: 480, margin: "0 auto", position: "relative" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18, borderBottom: "2px solid #C9BEA0", paddingBottom: 14 },
  eyebrow: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#6B6250" },
  title: { fontFamily: "'Special Elite', monospace", fontSize: 28, margin: "4px 0 0", color: "#1B2A4A" },
  iconBtn: { background: "#fff", border: "1px solid #C9BEA0", borderRadius: 8, width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 18 },
  warnBanner: { background: "#F4E9D8", border: "1px solid #C9BEA0", borderLeft: "4px solid #B23A2E", padding: "10px 12px", fontSize: 13, borderRadius: 6, marginBottom: 16, color: "#4a4331" },
  monthNav: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 },
  navBtn: { background: "transparent", border: "none", cursor: "pointer", padding: 6, fontSize: 22, color: "#1B2A4A" },
  monthLabel: { fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 16, letterSpacing: 0.5 },
  weekRow: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", marginBottom: 4 },
  weekDay: { textAlign: "center", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#6B6250", padding: "4px 0" },
  grid: { display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 20 },
  dayCell: { aspectRatio: "1", background: "#fff", border: "1px solid #DCD3BB", borderRadius: 8, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", cursor: "pointer", position: "relative", padding: 2 },
  dayCellToday: { border: "2px solid #1B2A4A" },
  dayCellWorked: { background: "#E7EEE9", borderColor: "#3F5C4E" },
  dayNum: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, fontWeight: 600 },
  dayHours: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, color: "#3F5C4E", fontWeight: 600 },
  dayStamp: { position: "absolute", bottom: -3, right: -3, fontSize: 7, padding: "0 2px" },
  summary: { background: "#fff", border: "1px solid #DCD3BB", borderRadius: 10, padding: "16px 16px 6px" },
  summaryHeaderRow: { display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 },
  summaryEyebrow: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: "#6B6250" },
  summaryDays: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: "#3F5C4E" },
  summaryRow: { display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px dashed #DCD3BB", fontSize: 14 },
  summaryLabel: { color: "#1B2A4A" },
  summarySub: { color: "#6B6250", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12 },
  summaryValue: { fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600 },
  totalRow: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0 12px", marginTop: 4 },
  totalLabel: { fontFamily: "'Special Elite', monospace", fontSize: 15 },
  totalAmount: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 22, fontWeight: 700, color: "#B23A2E" },
  settingsWrap: { background: "#fff", border: "1px solid #DCD3BB", borderRadius: 10, padding: 18 },
  settingsIntro: { fontSize: 13, color: "#6B6250", marginTop: 0, marginBottom: 18, lineHeight: 1.5 },
  fieldLabel: { display: "block", fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: "#4a4331", marginBottom: 6 },
  input: { width: "100%", padding: "10px 12px", border: "1px solid #C9BEA0", borderRadius: 6, fontSize: 15, fontFamily: "'IBM Plex Mono', monospace", background: "#FBF9F3", color: "#1B2A4A" },
  inputSub: { fontSize: 10, color: "#6B6250", textAlign: "center", marginTop: 3, fontFamily: "'IBM Plex Mono', monospace" },
  breakdownBox: { background: "#F4E9D8", borderRadius: 6, padding: "10px 12px", marginBottom: 14, fontSize: 13 },
  breakdownRow: { display: "flex", justifyContent: "space-between", padding: "3px 0" },
  toggle: { display: "flex", alignItems: "center", gap: 10, background: "#FBF9F3", border: "1px solid #C9BEA0", borderRadius: 6, padding: "10px 12px", fontSize: 13, cursor: "pointer", marginBottom: 10, width: "100%", color: "#1B2A4A" },
  toggleActive: { background: "#E7EEE9", borderColor: "#3F5C4E" },
  toggleLocked: { cursor: "default", opacity: 0.9 },
  toggleSub: { fontSize: 11, color: "#6B6250", marginTop: 1 },
  toggleBox: { width: 18, height: 18, minWidth: 18, border: "1px solid #3F5C4E", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", background: "#3F5C4E", flexShrink: 0, color: "#fff", fontSize: 12 },
  toggleBoxOff: { background: "transparent" },
  dayPreview: { background: "#F4E9D8", borderRadius: 6, padding: "10px 12px", fontSize: 13, marginBottom: 16 },
  modalActions: { display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 },
  deleteBtn: { display: "flex", alignItems: "center", gap: 6, background: "transparent", border: "none", color: "#B23A2E", fontSize: 13, cursor: "pointer", padding: "10px 4px" },
  saveBtn: { background: "#1B2A4A", color: "#fff", border: "none", borderRadius: 6, padding: "12px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", flex: 1 },
  modalOverlay: { position: "fixed", inset: 0, background: "rgba(27,42,74,0.45)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 },
  modalCard: { background: "#EDE6D6", width: "100%", maxWidth: 480, borderRadius: "16px 16px 0 0", padding: "20px 18px 26px" },
  modalHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 },
  modalTitle: { fontFamily: "'Special Elite', monospace", fontSize: 18 },
  toast: { position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "#1B2A4A", color: "#fff", padding: "10px 18px", borderRadius: 20, fontSize: 13, fontFamily: "'IBM Plex Mono', monospace", zIndex: 60 },
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StipendioApp />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
